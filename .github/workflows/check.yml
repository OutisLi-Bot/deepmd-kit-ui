# SPDX-License-Identifier: LGPL-3.0-or-later
name: Check DeePMD Studio

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev

      - name: Check Python tooling
        env:
          PYTHONPATH: python
        run: |
          pip install "deepmd-kit>=3.1" pytest pytest-timeout ruff
          ruff check python scripts
          ruff format --check python scripts
          pytest -q python/tests scripts/tests

      - name: Check frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

      - name: Check Rust core, TUI, and desktop shell
        run: |
          cargo fmt --all -- --check
          cargo test -p deepmd-studio-core -p dpstudio
          pnpm prepare:sidecar:debug
          cargo check -p deepmd-studio
